name: Deploy to GitHub Pages

# UNIVERSAL NEXT.JS STAGING TEMPLATE (managed by the Hub).
# For Next.js sites configured with output:'export'. Builds to ./out and
# deploys that. If a CNAME file exists at the repo root (custom domain), it's
# copied into ./out so the domain is preserved. Edit in the Hub
# (templates/deploy-next.yml) and re-run `npm run sites:stage`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build (Next.js static export)
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build
      - name: Preserve custom domain (CNAME) if present
        run: if [ -f CNAME ]; then cp CNAME out/CNAME; fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
