name: Deploy to GitHub Pages

# UNIVERSAL STATIC STAGING TEMPLATE (managed by the Hub).
# For plain HTML/CSS/JS sites whose deployable files sit at the repo root.
# Uploads the whole repo root as-is — so a CNAME file at the root is preserved
# and the custom domain keeps working. Do not edit per-repo; edit in the Hub
# (templates/deploy-static.yml) and re-run `npm run sites:stage`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
